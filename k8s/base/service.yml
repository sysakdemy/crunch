apiVersion: v1
kind: Service
metadata:
  name: crunch-svc
  namespace: crunch
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 5000
  selector:
    app: crunch
  sessionAffinity: None
  type: ClusterIP